name: CI workflow

on:
  push:
    branch: [main]
  pull_request:
    branch: [main]

jobs:
  build:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: use node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run test --if-present
